<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Professional Flight System v3.0</title>
    <style>
        :root { --neon: #00ff66; --warn: #ff3300; --panel: #121214; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Consolas', monospace; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 260px; background: var(--panel); border-right: 2px solid #222; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .data-box { background: rgba(255,255,255,0.03); border: 1px solid #333; padding: 12px; margin-bottom: 12px; border-radius: 4px; border-left: 3px solid #444; }
        .label { font-size: 10px; color: #888; text-transform: uppercase; }
        .value { font-size: 24px; color: var(--neon); font-weight: 300; }
        #viewport { flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #050505; }
        canvas { border: 2px solid #333; border-radius: 8px; max-width: 95vw; }
        #master-warn { position: absolute; top: 12%; background: var(--warn); color: #fff; padding: 12px 50px; font-weight: 900; font-size: 24px; border: 2px solid #fff; display: none; animation: blink 0.4s infinite; z-index: 100; }
        #crash-screen { position: absolute; inset: 0; background: rgba(40, 0, 0, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(15px); }
        .black-box { background: #000; padding: 20px; border: 1px solid var(--warn); border-radius: 8px; margin-top: 15px; width: 320px; }
        #controls { position: absolute; bottom: 30px; display: flex; gap: 10px; }
        button { background: #222; color: #eee; border: 1px solid #444; padding: 12px 25px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn-main { background: var(--neon); color: #000; border: none; }
        @keyframes blink { 50% { opacity: 0; } }
        @media (max-width: 768px) { #sidebar { display: none; } }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="font-size: 12px; color: #666; margin-bottom: 20px; letter-spacing: 2px;">FLIGHT DATA</div>
    <div class="data-box"><div class="label">ALT (BEIDOU)</div><div class="value" id="ui-alt">2000</div></div>
    <div class="data-box"><div class="label">SPD (KNOTS)</div><div class="value" id="ui-speed">150</div></div>
    <div class="data-box"><div class="label">PITCH</div><div class="value" id="ui-pitch">0.0</div></div>
    <div class="data-box"><div class="label">ROLL</div><div class="value" id="ui-roll">0.0</div></div>
    <div style="margin-top: auto; font-size: 10px; color: #444;">CTRL: WASD / PAD / GYRO</div>
</div>

<div id="viewport">
    <div id="master-warn">SINK RATE / PULL UP</div>
    <div id="crash-screen">
        <h1 style="color:white">CRASHED</h1>
        <div class="black-box" id="fdr-data"></div>
        <button onclick="location.reload()" class="btn-main" style="margin-top: 20px;">RESTART</button>
    </div>
    <canvas id="pfd" width="600" height="600"></canvas>
    <div id="controls">
        <button class="btn-main" onclick="startApp()">1. START SYSTEM</button>
        <button onclick="calibrate()">2. TRIM</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('pfd');
    const ctx = canvas.getContext('2d');
    
    let state = {
        pitch: 0, roll: 0, hdg: 0,
        vP: 0, vR: 0,
        speed: 150, alt: 2000,
        trimP: 0, trimR: 0,
        isCrashed: false, active: false,
        keys: {}, startTime: Date.now()
    };

    let audioCtx;

    // 键盘监听
    window.addEventListener('keydown', e => state.keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => state.keys[e.key.toLowerCase()] = false);

    async function startApp() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        state.active = true;
        state.startTime = Date.now(); // 刷新计时，提供保护期

        // 传感器授权
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res === 'granted') window.addEventListener('deviceorientation', handleGyro);
        } else {
            window.addEventListener('deviceorientation', handleGyro);
        }

        navigator.geolocation.watchPosition(p => {
            if(p.coords.speed) state.speed = p.coords.speed * 1.943;
            if(p.coords.altitude) state.alt = p.coords.altitude;
        }, null, { enableHighAccuracy: true });

        requestAnimationFrame(loop);
    }

    function handleGyro(e) {
        if (!state.active) return;
        state.pitch = e.beta - 45 - state.trimP;
        state.roll = e.gamma - state.trimR;
    }

    function loop() {
        if (state.isCrashed || !state.active) return;

        // 1. 电脑键盘控制逻辑 (WASD)
        if (state.keys['w']) state.vP += 0.15;
        if (state.keys['s']) state.vP -= 0.15;
        if (state.keys['a']) state.vR -= 0.2;
        if (state.keys['d']) state.vR += 0.2;

        // 2. 手柄控制逻辑
        const pads = navigator.getGamepads();
        if (pads[0] && pads[0].axes.length >= 2) {
            if(Math.abs(pads[0].axes[1]) > 0.1) state.vP += pads[0].axes[1] * 0.2;
            if(Math.abs(pads[0].axes[0]) > 0.1) state.vR += pads[0].axes[0] * 0.2;
        }

        // 3. 真实物理反馈 (气流与扭矩)
        let turb = (Math.random() - 0.5) * 0.08;
        state.vP += turb + (-state.pitch * 0.01); 
        state.vR += turb + 0.01; // 自动向右微倾
        
        state.vP *= 0.94; state.vR *= 0.94;
        state.pitch += state.vP; state.roll += state.vR;

        // 4. 环境耦合
        state.alt -= (state.pitch * 0.2); 
        state.speed += (state.pitch * 0.05);

        // 5. 强化版坠机判定 (增加3秒起飞保护)
        if (Date.now() - state.startTime > 3000) {
            if (state.alt <= 0) {
                doCrash("地表撞击 (IMPACT)");
            } else if (Math.abs(state.pitch) > 89 || Math.abs(state.roll) > 110) {
                doCrash("姿态过载结构解体 (STRUCTURAL FAILURE)");
            }
        }

        render();
        updateUI();
        requestAnimationFrame(loop);
    }

    function render() {
        const cx = 300, cy = 300;
        ctx.clearRect(0,0,600,600);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(-state.roll * Math.PI / 180);
        const pOff = state.pitch * 10;
        // 天地
        ctx.fillStyle = "#1e90ff"; ctx.fillRect(-1200, -1200 + pOff, 2400, 1200);
        ctx.fillStyle = "#5a3a1a"; ctx.fillRect(-1200, pOff, 2400, 1200);
        // 刻度
        ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 2;
        for(let i=-90; i<=90; i+=10) {
            let y = pOff - (i*10);
            ctx.beginPath(); ctx.moveTo(-50, y); ctx.lineTo(50, y); ctx.stroke();
        }
        ctx.restore();
        // 飞机参照
        ctx.strokeStyle = "#ffff00"; ctx.lineWidth = 5; ctx.beginPath();
        ctx.moveTo(cx-120, cy); ctx.lineTo(cx-50, cy); ctx.lineTo(cx-50, cy+20);
        ctx.moveTo(cx+120, cy); ctx.lineTo(cx+50, cy); ctx.lineTo(cx+50, cy+20);
        ctx.stroke();
    }

    function doCrash(reason) {
        state.isCrashed = true;
        document.getElementById('crash-screen').style.display = 'flex';
        document.getElementById('fdr-data').innerHTML = `
            <p>原因: ${reason}</p>
            <p>撞击速度: ${state.speed.toFixed(1)} KT</p>
            <p>最终姿态: ${state.pitch.toFixed(1)}°</p>
        `;
        playExplosion();
    }

    function playExplosion() {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sawtooth'; o.frequency.value = 40;
        g.connect(audioCtx.destination); o.connect(g);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
        o.start(); o.stop(audioCtx.currentTime + 1);
    }

    function updateUI() {
        document.getElementById('ui-alt').innerText = Math.max(0, state.alt).toFixed(0);
        document.getElementById('ui-speed').innerText = Math.max(0, state.speed).toFixed(1);
        document.getElementById('ui-pitch').innerText = state.pitch.toFixed(1);
        document.getElementById('ui-roll').innerText = state.roll.toFixed(1);
        
        const warn = document.getElementById('master-warn');
        if (state.alt < 500 || Math.abs(state.pitch) > 35) {
            warn.style.display = 'block';
            if (Math.floor(Date.now()/500)%2==0) {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.frequency.value = 800; g.connect(audioCtx.destination); o.connect(g);
                g.gain.setTargetAtTime(0.05, audioCtx.currentTime, 0.01);
                o.start(); o.stop(audioCtx.currentTime + 0.1);
            }
        } else { warn.style.display = 'none'; }
    }

    function calibrate() { state.trimP = state.pitch + state.trimP; state.trimR = state.roll + state.trimR; }
</script>
</body>
</html>
